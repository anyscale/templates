# BUILD.yaml Entry Schema
#
# Each entry in BUILD.yaml is a list item defining a template.
# The file is parsed as a YAML list of Template objects.
#
# Template names must match: ^[a-z0-9_-]+$

# --- Full schema with all fields ---

- name: <template-name>          # REQUIRED. Unique identifier. Appears in console URL.
  owner_team: <team>             # REQUIRED. One of: ray-serve | ray-data | llm | ray-train | general.
                                 #   Deduced from content — see "owner_team deduction" below.
  dir: templates/<dir-name>      # REQUIRED. Path to template content (relative to repo root).

  # REQUIRED. Exactly one of: image_uri, or byod.
  cluster_env:
    # Option 1: Stock Anyscale image
    image_uri: anyscale/ray:2.54.1-py312-cu128

    # Option 2: BYOD (Bring Your Own Docker)
    # Set docker_image to the GCP Artifact Registry URI of the built image URI from `anyscale image build`.
    # ray_version must be the same as the version used to build the image.
    # byod:
    #   docker_image: us-docker.pkg.dev/anyscale-workspace-templates/workspace-templates/<image-name>:<ray-version>
    #   ray_version: <ray-version>

    # Option 3: BYOD from an external (third-party) registry
    # docker_image points to an external registry that we do not own or rebuild.
    # When bumping Ray, keep the same repo and tag pattern — pick the latest available tag with the highest Ray version.
    # Do NOT swap to anyscale/ray. ray_version must match the Ray version embedded in the upstream tag.
    # byod:
    #   docker_image: <registry>/<image-name>      # e.g. novaskyai/skyrl-train-ray-2.51.1-py3.12-cu12.8
    #   ray_version: <ray-version>                 # Infer from the image's metadata/Dockerfile

  # REQUIRED. Map of cloud provider to compute config file path.
  compute_config:
    AWS: configs/<config-dir>/aws.yaml
    GCP: configs/<config-dir>/gce.yaml

  # REQUIRED for entries under templates/ — active templates are tested. Entries
  # under archive/ are exempt (test-free — e.g. fast event iteration or a retired
  # template; see workflows/archive-template.md).
  test:
    command: bash tests.sh            # REQUIRED.
    tests_path: tests/<name>/         # REQUIRED. Relative path (no absolute, no "..").
    timeout_in_sec: 900               # REQUIRED. Must be > 0.

# --- Image URI conventions ---
#
# Format: anyscale/<base>:<ray-version>-<variant>-<python>-<cuda>
#
# Base images. Must be one of the following:
#   anyscale/ray          - Standard Ray image
#   anyscale/ray-llm      - Ray + LLM serving dependencies
#
# Common variants:
#   anyscale/ray:<ray-version>-py312-cu128          - Full GPU image
#   anyscale/ray:<ray-version>-slim-py312-cu128     - Slim GPU image
#   anyscale/ray:<ray-version>-py311                - CPU-only image
#   anyscale/ray-llm:<ray-version>-py311-cu128      - LLM serving image
#
# See: https://docs.anyscale.com/reference/base-images

# --- owner_team deduction (content → single value) ---
#
# The owning team, deduced from what the template is fundamentally ABOUT (its
# center of gravity), not merely what it imports. Pick exactly one:
#
#   ray-serve  - non-LLM online model serving: @serve.deployment, model
#                composition / multiplexing, inference APIs.
#   ray-data   - non-LLM batch/streaming data pipelines & offline batch
#                inference: map_batches, embeddings-at-scale, ETL.
#   llm        - fundamentally LLM: vLLM, ray.serve.llm, ray.data.llm, LLM
#                fine-tuning, RAG, LLM agents.
#   ray-train  - distributed training / fine-tuning (TorchTrainer, FSDP,
#                DeepSpeed, tensor-parallel) & Ray Tune HPO, non-LLM-centric.
#   general    - platform / Ray Core / onboarding with no single-library owner:
#                intros (jobs, workspaces, services, clusters), multi-library
#                surveys, pure Ray Core task/actor parallelism.
#
# Multi-library tie-break: llm wins when the template is fundamentally an LLM
# template (even if it also uses ray.data for batch or ray.train to fine-tune an
# LLM). Otherwise pick the primary purpose — a Data→Train pipeline whose point is
# training → ray-train; a batch-inference/embeddings pipeline → ray-data; a
# serving demo → ray-serve. Teaching the platform/Core rather than a library →
# general.

# --- Cross-field rules (enforced by scripts/hooks/validate-build-yaml.py) ---
#
# - tests_path basename must equal name → tests/<name>/
# - compute_config GCP and AWS must share the same configs/<dir>/
# - that dir's basename must equal name, OR be `basic-single-node`
# - For byod on the Anyscale GCP registry, docker_image must be exactly:
#     us-docker.pkg.dev/anyscale-workspace-templates/workspace-templates/<name>:<byod.ray_version>
#   (image basename == name, tag == byod.ray_version). push-custom-image-to-gcp.sh produces this form.
