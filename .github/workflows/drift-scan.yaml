name: drift-scan

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, labeled, unlabeled]

concurrency:
  group: drift-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    # Fork PRs lack BUILDKITE_API_TOKEN; bail.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
    # `exit 0` here would only end this step's shell, not skip the job;
    # write skip=true and gate every later step on it.
    - name: Auth-check label event sender
      id: auth
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [[ "${{ github.event.action }}" != "labeled" && "${{ github.event.action }}" != "unlabeled" ]]; then
          echo "skip=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if gh api /orgs/anyscale/members/${{ github.event.sender.login }} --silent 2>/dev/null; then
          echo "skip=false" >> "$GITHUB_OUTPUT"
        else
          echo "Sender ${{ github.event.sender.login }} is not an anyscale org member; ignoring ${{ github.event.action }} event"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        fi

    - uses: actions/checkout@v4
      if: steps.auth.outputs.skip != 'true'
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        # Full history so `git rev-parse HEAD:<path>` resolves tree/blob hashes.
        fetch-depth: 0

    - uses: actions/setup-python@v5
      if: steps.auth.outputs.skip != 'true'
      with:
        python-version: '3.12'

    - name: Install drift-scan deps
      if: steps.auth.outputs.skip != 'true'
      run: pip install -r ci/drift_gate/requirements.txt

    - name: Compute drift
      id: drift
      if: steps.auth.outputs.skip != 'true'
      run: |
        DRIFTED=$(python ci/drift_gate/drift_scan.py)
        echo "drifted=$DRIFTED" >> "$GITHUB_OUTPUT"
        echo "Drifted templates: $DRIFTED"

    - name: Check 'go' label
      id: go
      if: steps.auth.outputs.skip != 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Event payload may be stale if labels were applied in quick succession.
        if gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} \
            --json labels --jq '.labels[].name' | grep -qx go; then
          echo "go=true" >> "$GITHUB_OUTPUT"
        else
          echo "go=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Trigger publish-templates fanout
      if: steps.auth.outputs.skip != 'true'
      env:
        BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
        BUILDKITE_ORG: ${{ secrets.BUILDKITE_ORG }}
      run: |
        curl -sfS -o /dev/null \
          -X POST \
          -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg branch "${{ github.event.pull_request.head.ref }}" \
            --arg sha "${{ github.event.pull_request.head.sha }}" \
            --arg drifted '${{ steps.drift.outputs.drifted }}' \
            --arg go_present '${{ steps.go.outputs.go }}' \
            --arg pr_number '${{ github.event.pull_request.number }}' \
            --arg msg "drift-scan: PR #${{ github.event.pull_request.number }}" \
            '{
              message: $msg,
              commit: $sha,
              branch: $branch,
              meta_data: {
                drifted_templates: $drifted,
                go_present: $go_present,
                pr_number: $pr_number,
                pr_head_sha: $sha,
                pr_head_ref: $branch
              }
            }'
          )" \
          "https://api.buildkite.com/v2/organizations/${BUILDKITE_ORG}/pipelines/publish-templates/builds"
