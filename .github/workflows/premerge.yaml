name: premerge

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: premerge-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # Install pre-commit + nbconvert (the check-readme local hook needs jupyter-nbconvert)
    - name: Install pre-commit
      run: pip install pre-commit==3.8.0 nbconvert==7.17.1 pyyaml==6.0.3 pydantic==2.13.3

    - name: Run pre-commit
      run: pre-commit run --all-files --verbose

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install nbconvert
      run: pip install nbconvert==7.17.1

    - name: Build templates
      run: |
        bash ./download_rayapp.sh
        ./rayapp build all

  validate-build-yaml:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pyyaml==6.0.3 pydantic==2.13.3
    - run: python ci/validate_build_yaml.py

  check-depsets:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Check depsets are up to date
      run: ./update_deps.sh --check
