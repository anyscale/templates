name: premerge

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
      with:
        python-version: '3.9'

    # Install pre-commit dependencies + pyyaml/pydantic (the check-build-yaml local hook needs them)
    - name: Install pre-commit
      run: pip install pre-commit==3.8.0 jupyter==1.1.1 pyyaml pydantic

    # Run pre-commit hooks with verbose logging
    - name: Run pre-commit
      run: pre-commit run --all-files --verbose

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
      with:
        python-version: '3.9'
    - uses: actions/setup-go@v5
      with:
        go-version: 1.25

    - name: Install pre-commit
      run: pip install jupyter==1.1.1

    - name: Build
      run: bash -ec "(cd ci; go install ./...)"

    - name: Build templates
      run: |
        bash ./download_rayapp.sh
        ./rayapp build all

  validate-build-yaml:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pyyaml pydantic
    - run: python ci/validate_build_yaml.py
