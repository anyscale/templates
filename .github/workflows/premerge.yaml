name: premerge

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: premerge-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v8.3.2
      with:
        python-version: '3.12'
        enable-cache: true

    - name: Install dev deps
      run: uv sync --frozen

    - name: Run pre-commit
      run: uv run pre-commit run --all-files --verbose

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v8.3.2
      with:
        python-version: '3.12'
        enable-cache: true

    - name: Install dev deps
      run: uv sync --frozen

    - name: Build templates
      run: |
        bash ./download_rayapp.sh
        uv run ./rayapp build all

  validate-build-yaml:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v8.3.2
      with:
        python-version: '3.12'
        enable-cache: true
    - run: uv sync --frozen
    - run: uv run python scripts/hooks/validate-build-yaml.py

  check-depsets:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # need the base commit to diff changed files
    - uses: astral-sh/setup-uv@v8.3.2
      with:
        python-version: '3.12'
        enable-cache: true
    - run: uv sync --frozen

    - name: Check depsets are up to date
      # Scoped + retried; see scripts/hooks/check-depsets.py. Checks only what a PR changed, so
      # unrelated PRs don't fail on ambient drift or a transient index 503.
      run: uv run python scripts/hooks/check-depsets.py "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
