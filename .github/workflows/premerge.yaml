name: premerge

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: premerge-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dev deps
      run: pip install -r requirements-dev.txt

    - name: Run pre-commit
      run: pre-commit run --all-files --verbose

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dev deps
      run: pip install -r requirements-dev.txt

    - name: Build templates
      run: |
        bash ./download_rayapp.sh
        ./rayapp build all

  validate-build-yaml:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install -r requirements-dev.txt
    - run: python ci/validate_build_yaml.py

  check-depsets:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # need the base commit to diff changed files
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install pyyaml==6.0.3   # parses the depset config (pin matches requirements-dev.txt)

    - name: Check depsets are up to date
      # Scoped + retried; see ci/check_depsets.py. Checks only what a PR changed, so
      # unrelated PRs don't fail on ambient drift or a transient index 503.
      run: python3 ci/check_depsets.py "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
