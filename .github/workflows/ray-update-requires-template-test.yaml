name: ray-update-requires-template-test

# Gate ray-update PRs on a passing buildkite/template-test build.
# - pull_request triggers re-evaluate on push, label changes, etc.
# - status trigger re-evaluates whenever a commit status (e.g. Buildkite's
#   build result) lands, so the gate flips green automatically without a
#   manual rerun once /test-template finishes.
# Mark this workflow's check as required in the main branch protection rule.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  status:

permissions:
  contents: read
  pull-requests: read
  statuses: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify buildkite/template-test passed when ray-update label is set
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Build the list of PRs to evaluate. status events can map to
          # multiple PRs (stacked PRs, backports), so iterate all of them
          # rather than picking [0] and silently missing a ray-update PR.
          PRS=()
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PRS+=("${{ github.event.pull_request.number }}")
          else
            STATUS_SHA="${{ github.event.sha }}"
            while IFS= read -r N; do
              [ -n "$N" ] && PRS+=("$N")
            done < <(gh api "/repos/$REPO/commits/$STATUS_SHA/pulls" --jq '.[].number')
            if [ ${#PRS[@]} -eq 0 ]; then
              echo "No PR contains commit $STATUS_SHA — nothing to gate."
              exit 0
            fi
          fi

          ANY_FAILED=0
          for PR in "${PRS[@]}"; do
            echo "::group::PR #$PR"

            # Always re-fetch the PR's current head + labels from the API,
            # never trust event payloads. Closes the stale-SHA hole where a
            # late-arriving status from an earlier commit would otherwise
            # gate the new HEAD as 'green'.
            PR_DATA=$(gh pr view "$PR" --repo "$REPO" --json headRefOid,labels,isCrossRepository)
            HEAD_SHA=$(echo "$PR_DATA" | jq -r '.headRefOid')
            LABELS=$(echo "$PR_DATA" | jq -r '[.labels[].name] | join(",")')
            IS_FORK=$(echo "$PR_DATA" | jq -r '.isCrossRepository')
            echo "PR #$PR HEAD: $HEAD_SHA"
            echo "PR #$PR labels: $LABELS"
            echo "PR #$PR fork?: $IS_FORK"

            # On a status event, the check-run we produce is attached to
            # the status's commit. Branch protection on a PR looks at the
            # PR's head commit's checks, so only gate PRs whose current
            # head is this commit; others will be re-evaluated when their
            # own heads move.
            if [[ "${{ github.event_name }}" == "status" ]] \
               && [[ "$HEAD_SHA" != "${{ github.event.sha }}" ]]; then
              echo "PR #$PR HEAD ≠ status SHA — skipping (will fire when its own head moves)."
              echo "::endgroup::"
              continue
            fi

            if ! echo ",$LABELS," | grep -q ',ray-update,'; then
              echo "ray-update label not present — passing for PR #$PR."
              echo "::endgroup::"
              continue
            fi

            # Fork PRs can't dispatch /test-template (the test-template.yaml
            # workflow refuses cross-repo PRs for security), so the
            # buildkite/template-test status will never appear and this
            # gate would block forever. Surface that with an actionable
            # message instead of the generic "missing build" error.
            if [[ "$IS_FORK" == "true" ]]; then
              echo "::error::PR #$PR is from a fork. /test-template doesn't dispatch from fork PRs (see .github/workflows/test-template.yaml), so buildkite/template-test can never run on this branch — the ray-update gate will stay red. Mirror the change to an internal branch (or have a maintainer do it) and re-open the PR there."
              ANY_FAILED=1
              echo "::endgroup::"
              continue
            fi

            # Latest buildkite/template-test commit-status on this PR's HEAD.
            # Empty list from jq → "missing" sentinel, so never-run is
            # distinguishable from failed/pending.
            STATUS=$(gh api "/repos/$REPO/commits/$HEAD_SHA/status" \
                     --jq '[.statuses[] | select(.context | startswith("buildkite/template-test"))] | sort_by(.updated_at) | last | .state // "missing"')
            echo "buildkite/template-test status on HEAD: $STATUS"

            case "$STATUS" in
              success)
                echo "PR #$PR: buildkite/template-test is green — passing."
                ;;
              missing)
                echo "::error::PR #$PR: no buildkite/template-test build for HEAD ($HEAD_SHA). Comment '/test-template <template-name>' to dispatch one."
                ANY_FAILED=1
                ;;
              pending)
                echo "::error::PR #$PR: buildkite/template-test still running on $HEAD_SHA. Wait for it to finish; this check will re-run automatically."
                ANY_FAILED=1
                ;;
              failure|error)
                echo "::error::PR #$PR: buildkite/template-test reported '$STATUS' on $HEAD_SHA. Investigate, push a fix, then re-run /test-template."
                ANY_FAILED=1
                ;;
              *)
                echo "::error::PR #$PR: unexpected buildkite/template-test status '$STATUS' on $HEAD_SHA."
                ANY_FAILED=1
                ;;
            esac
            echo "::endgroup::"
          done

          [ $ANY_FAILED -eq 0 ]
