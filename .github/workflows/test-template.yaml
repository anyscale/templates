name: test-template

on:
  issue_comment:
    types: [created]

jobs:
  trigger-template-test:
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/test-template ') &&
      contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
    - name: Parse template name from comment
      id: parse
      env:
        COMMENT_BODY: ${{ github.event.comment.body }}
      run: |
        TEMPLATE=$(echo "$COMMENT_BODY" | awk '/^\/test-template / { print $2; exit }')
        if [[ ! "$TEMPLATE" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "::error::Invalid template name: $TEMPLATE"
          exit 1
        fi
        echo "template=$TEMPLATE" >> "$GITHUB_OUTPUT"

    - name: Get PR ref
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          if (pr.data.head.repo.full_name !== pr.data.base.repo.full_name) {
            core.setFailed('Cannot test templates from fork PRs');
            return;
          }
          core.setOutput('branch', pr.data.head.ref);
          core.setOutput('sha', pr.data.head.sha);

    - name: Trigger Buildkite build
      env:
        BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
        BUILDKITE_ORG: ${{ secrets.BUILDKITE_ORG }}
        BUILDKITE_PIPELINE: ${{ secrets.BUILDKITE_TEMPLATE_TEST_PIPELINE }}
      run: |
        curl -sfS -o /dev/null \
          -X POST \
          -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg branch "${{ steps.pr.outputs.branch }}" \
            --arg sha "${{ steps.pr.outputs.sha }}" \
            --arg template "${{ steps.parse.outputs.template }}" \
            --arg msg "Test template: ${{ steps.parse.outputs.template }} (PR #${{ github.event.issue.number }})" \
            --arg secret "${{ secrets.ANYSCALE_CLI_TOKEN_SECRET_NAME }}" \
            '{
              message: $msg,
              commit: $sha,
              branch: $branch,
              env: {
                TEMPLATE_NAME: $template,
                ANYSCALE_CLI_TOKEN_SECRET_NAME: $secret
              }
            }'
          )" \
          "https://api.buildkite.com/v2/organizations/${BUILDKITE_ORG}/pipelines/${BUILDKITE_PIPELINE}/builds"
