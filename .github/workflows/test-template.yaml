name: test-template

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      template:
        description: 'Template name from BUILD.yaml (e.g. job-intro)'
        required: true
        type: string

jobs:
  test-template:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/test-template '))
    runs-on: ubuntu-latest
    steps:
    - name: Verify commenter and PR author are Anyscale enterprise members
      if: github.event_name == 'issue_comment'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.READ_ENTERPRISE_PAT }}
        script: |
          const commenter = context.payload.comment.user.login;
          const prAuthor = context.payload.issue.user.login;

          for (const username of [commenter, prAuthor]) {
            const result = await github.graphql(`
              query($enterprise: String!, $search: String!) {
                enterprise(slug: $enterprise) {
                  members(query: $search, first: 20) {
                    nodes {
                      ... on EnterpriseUserAccount { login }
                      ... on User { login }
                    }
                  }
                }
              }
            `, { enterprise: 'anyscale', search: username });

            const isMember = result.enterprise.members.nodes.some(
              node => node.login.toLowerCase() === username.toLowerCase()
            );
            if (!isMember) {
              core.setFailed(`${username} is not an Anyscale enterprise member`);
              return;
            }
            console.log(`✓ ${username} is an Anyscale enterprise member`);
          }

    - name: Parse template name from comment
      if: github.event_name == 'issue_comment'
      id: parse
      env:
        COMMENT_BODY: ${{ github.event.comment.body }}
      run: |
        TEMPLATE=$(echo "$COMMENT_BODY" | awk '/^\/test-template / { print $2; exit }')
        if [[ ! "$TEMPLATE" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "::error::Invalid template name: $TEMPLATE"
          exit 1
        fi
        echo "template=$TEMPLATE" >> "$GITHUB_OUTPUT"

    - name: Get PR ref
      if: github.event_name == 'issue_comment'
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          if (pr.data.head.repo.full_name !== pr.data.base.repo.full_name) {
            core.setFailed('Cannot test templates from fork PRs');
            return;
          }
          core.setOutput('sha', pr.data.head.sha);

    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'issue_comment' && steps.pr.outputs.sha || github.ref }}

    - name: Download rayapp
      run: bash ./download_rayapp.sh

    - name: Test template
      env:
        ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
        ANYSCALE_HOST: https://console.anyscale-staging.com
        TEMPLATE: ${{ github.event_name == 'issue_comment' && steps.parse.outputs.template || inputs.template }}
      run: ./rayapp test "$TEMPLATE"
