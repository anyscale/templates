name: test-template

on:
  issue_comment:
    types: [created]

jobs:
  test-template:
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/test-template ') &&
      contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
    - name: Parse template name from comment
      id: parse
      env:
        COMMENT_BODY: ${{ github.event.comment.body }}
      run: |
        TEMPLATE=$(echo "$COMMENT_BODY" | awk '/^\/test-template / { print $2; exit }')
        if [[ ! "$TEMPLATE" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "::error::Invalid template name: $TEMPLATE"
          exit 1
        fi
        echo "template=$TEMPLATE" >> "$GITHUB_OUTPUT"

    - name: Get PR ref
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          if (pr.data.head.repo.full_name !== pr.data.base.repo.full_name) {
            core.setFailed('Cannot test templates from fork PRs');
            return;
          }
          core.setOutput('sha', pr.data.head.sha);

    - name: Create check run
      id: check
      uses: actions/github-script@v7
      with:
        script: |
          const check = await github.rest.checks.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            name: 'test-template / ${{ steps.parse.outputs.template }}',
            head_sha: '${{ steps.pr.outputs.sha }}',
            status: 'in_progress',
            details_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
          });
          core.setOutput('id', check.data.id);

    - uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr.outputs.sha }}

    - name: Install Anyscale CLI
      run: pip install --user anyscale==0.26.87

    - name: Download rayapp
      run: bash ./download_rayapp.sh

    - name: Test template
      env:
        ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
        ANYSCALE_HOST: https://console.anyscale-staging.com
        TEMPLATE: ${{ steps.parse.outputs.template }}
      run: ./rayapp test "$TEMPLATE"

    - name: Update check run (success)
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.checks.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            check_run_id: ${{ steps.check.outputs.id }},
            status: 'completed',
            conclusion: 'success',
            details_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
          });

    - name: Update check run (failure)
      if: failure() && steps.check.outputs.id
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.checks.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            check_run_id: ${{ steps.check.outputs.id }},
            status: 'completed',
            conclusion: 'failure',
            details_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
          });
