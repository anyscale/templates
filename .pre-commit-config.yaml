default_stages: [commit, push]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=10000'] # fix max file size to 10MB to allow for large notebooks
      - id: trailing-whitespace
        # README might be auto-generated
        exclude: templates/.+/README.md
      - id: end-of-file-fixer
        # README might be auto-generated
        exclude: templates/.+/README.md
  - repo: local
    hooks:
      # Order matters: check the cheap notebook-hygiene rules first so the
      # slower nbconvert-based check-readme only runs when the .ipynb is
      # already in good shape.
      - id: check-cleared-outputs
        name: notebook outputs must be cleared before commit
        entry: python3 ci/check-cleared-outputs.py
        language: system
        pass_filenames: true
        files: \.ipynb$
      - id: check-image-urls
        name: image refs in notebooks and markdown must use absolute URLs
        entry: python3 ci/check-image-urls.py
        language: system
        pass_filenames: true
        files: \.(ipynb|md)$
      - id: check-readme
        name: README.md must match nbconvert output of README.ipynb
        entry: bash ci/check-readme.sh
        language: system
        pass_filenames: true
        files: ^templates/.+/(README\.ipynb|README\.md)$
      - id: check-build-yaml
        name: BUILD.yaml schema and referenced paths exist
        entry: python3 ci/validate_build_yaml.py --no-network
        language: system
        pass_filenames: false
        files: ^BUILD\.yaml$
