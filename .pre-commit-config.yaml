default_stages: [commit, push]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=10000'] # fix max file size to 10MB to allow for large notebooks
      - id: trailing-whitespace
        # README might be auto-generated
        exclude: templates/.+/README.md
      - id: end-of-file-fixer
        # README might be auto-generated
        exclude: templates/.+/README.md
  - repo: local
    hooks:
      - id: generate-readme
        name: Auto generate README.md from README.ipynb
        entry: python3 ci/auto-generate-readme.py
        language: system
        pass_filenames: true
        files: ^templates/
      - id: check-build-yaml
        name: BUILD.yaml schema and referenced paths exist
        entry: python3 ci/validate_build_yaml.py --no-network
        language: system
        pass_filenames: false
        files: ^BUILD\.yaml$
