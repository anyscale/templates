# UNDER CONSTRUCTION: we in the process of adding template definitions
# into this file. This file does not contain all the templates yet.

# job-intro template is to be removed and replaced by
# https://github.com/anyscale/first-job
# owner: matthew owen
- name: job-intro
  emoji: 🔰
  title: Intro to Jobs
  description: Happy path for tests with a test command
  dir: templates/intro-jobs
  cluster_env:
    build_id: anyscaleray2501-py311
  compute_config:
    GCP: configs/basic-single-node/gce.yaml
    AWS: configs/basic-single-node/aws.yaml
  test:
    command: pip install pytest==9.0.2 nbmake==1.5.5 && pytest --nbmake . -s -vv
    timeout_in_sec: 600

- name: job-intro-2
  emoji: 🔰
  title: Intro to Jobs
  description: Happy path for tests with a single test script
  dir: templates/intro-jobs
  cluster_env:
    image_uri: anyscale/ray:2.50.1-py311
  compute_config:
    GCP: configs/basic-single-node/gce.yaml
    AWS: configs/basic-single-node/aws.yaml
  test:
    tests_path: tests/intro-jobs
    command: bash test.sh
    timeout_in_sec: 600

- name: job-intro-3
  emoji: 🔰
  title: Intro to Jobs
  description: Failure path for tests with forced command failure
  dir: templates/intro-jobs
  cluster_env:
    byod:
      docker_image: us-docker.pkg.dev/anyscale-workspace-templates/workspace-templates/template_unstructured_data_ingestion:2.51.1
      ray_version: 2.51.1
  compute_config:
    GCP: configs/basic-single-node/gce.yaml
    AWS: configs/basic-single-node/aws.yaml
  test:
    command: exit 1
    timeout_in_sec: 600

- name: job-intro-4
  emoji: 🔰
  title: Intro to Jobs
  description: Failure path for tests with forced timeout
  dir: templates/intro-jobs
  cluster_env:
    byod:
      containerfile: templates/intro-jobs/Dockerfile
      ray_version: 2.51.1
  compute_config:
    GCP: configs/basic-single-node/gce.yaml
    AWS: configs/basic-single-node/aws.yaml
  test:
    tests_path: tests/intro-jobs
    command: bash test.sh
    timeout_in_sec: 10

