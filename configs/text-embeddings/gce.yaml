head_node_type:
  name: head
  instance_type: n2-standard-8
  resources:
    cpu: 0

worker_node_types:
# 8 vCPU, 1 NVIDIA L4 GPU, 32 GiB memory
- name: gpu-worker
  instance_type: g2-standard-8-nvidia-l4-1
  min_workers: 0
  max_workers: 4
  use_spot: true
  fallback_to_ondemand: true

gcp_advanced_configurations_json:
  instance_properties:
    labels:
      as-feature-multi-zone: 'true'
