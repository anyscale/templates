build_arg_sets:
  ray2551_py311_cu128:
    RAY_VERSION: "2.55.1"
    PYTHON_VERSION: "3.11"
    PYTHON_SHORT: "311"
    CUDA_VARIANT: "cu128"
  ray2551_py312_cu128:
    RAY_VERSION: "2.55.1"
    PYTHON_VERSION: "3.12"
    PYTHON_SHORT: "312"
    CUDA_VARIANT: "cu128"
  ray2560_py311_cu128:
    RAY_VERSION: "2.56.0"
    PYTHON_VERSION: "3.11"
    PYTHON_SHORT: "311"
    CUDA_VARIANT: "cu128"
  ray2560_py312_cu128:
    RAY_VERSION: "2.56.0"
    PYTHON_VERSION: "3.12"
    PYTHON_SHORT: "312"
    CUDA_VARIANT: "cu128"
  ray2560_py312_cu130:
    RAY_VERSION: "2.56.0"
    PYTHON_VERSION: "3.12"
    PYTHON_SHORT: "312"
    CUDA_VARIANT: "cu130"

depsets:
  - name: ray_depset_${RAY_VERSION}_${PYTHON_VERSION}
    operation: compile
    requirements:
      - /tmp/ray-deps/ray_img_${RAY_VERSION}_py${PYTHON_SHORT}.lock
    output: dependencies/depsets/ray_${RAY_VERSION}_img_py${PYTHON_SHORT}.lock
    append_flags:
      - --python-version=${PYTHON_VERSION}
      - --python-platform=linux
      - --unsafe-package ray
    build_arg_sets:
      - ray2551_py311_cu128
      - ray2551_py312_cu128
      - ray2560_py311_cu128
      - ray2560_py312_cu128

    pre_hooks:
      - dependencies/scripts/fetch-ray-depsets.sh ${RAY_VERSION} ${PYTHON_SHORT}
      - dependencies/scripts/fetch-ray-constraints.sh ${RAY_VERSION} ${PYTHON_VERSION}

  - name: ray_llm_depset_${RAY_VERSION}_${PYTHON_VERSION}_${CUDA_VARIANT}
    operation: compile
    requirements:
      - /tmp/ray-deps/rayllm_${RAY_VERSION}_py${PYTHON_SHORT}_${CUDA_VARIANT}.lock
    output: dependencies/depsets/rayllm_${RAY_VERSION}_py${PYTHON_SHORT}_${CUDA_VARIANT}.lock
    append_flags:
      - --python-version=${PYTHON_VERSION}
      - --python-platform=x86_64-manylinux_2_31
      - --unsafe-package ray
    build_arg_sets:
      - ray2551_py311_cu128
      - ray2560_py312_cu130
    pre_hooks:
      - dependencies/scripts/fetch-ray-llm-depsets.sh ${RAY_VERSION} ${PYTHON_SHORT} ${CUDA_VARIANT}
      - dependencies/scripts/fetch-ray-constraints.sh ${RAY_VERSION} ${PYTHON_VERSION}

