name: biotech-boltz-screening
entrypoint: python scripts/02_run_screening.py --scale medium --num-gpus 4

runtime_env:
  working_dir: .
  pip:
    - ray[data]>=2.9
    - boltz>=0.3
    - torch>=2.1
    - numpy>=1.24
    - pandas>=2.0
    - pyarrow>=14.0
    - rdkit>=2023.9
    - biopython>=1.82

compute_config: compute_config.yaml
max_retries: 2
