name: biotech-boltz-screening
entrypoint: python scripts/02_run_screening.py --scale medium --num-gpus 4

runtime_env:
  working_dir: .
  # Pin to the lock so the driver and workers share one env (a loose >= re-resolves per node).
  pip: python_depset.lock

compute_config:
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    - name: gpu-worker
      instance_type: g5.2xlarge
      min_nodes: 1
      max_nodes: 4
max_retries: 2
