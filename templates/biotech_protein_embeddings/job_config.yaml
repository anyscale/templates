name: biotech-protein-embeddings
entrypoint: python scripts/02_run_embedding.py --scale medium --bucketed

runtime_env:
  working_dir: .
  # Pin to the lock so the driver and workers share one env (a loose >= re-resolves per node).
  pip: python_depset.lock

compute_config:
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    - name: gpu-worker
      instance_type: g5.xlarge
      min_nodes: 1
      max_nodes: 2
max_retries: 2
