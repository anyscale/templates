name: sd-lora-finetuning
entrypoint: python scripts/run_training.py --num-workers 2 --num-epochs 3
image_uri: anyscale/ray:2.55.0-py311-cu128
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    - name: gpu-workers
      instance_type: g4dn.xlarge
      min_nodes: 2
      max_nodes: 2
env_vars:
  HF_HOME: /mnt/cluster_storage/hf_cache
requirements:
  - ray[train,data]>=2.9
  - torch>=2.0
  - torchvision>=0.15
  - diffusers>=0.25
  - transformers>=4.35
  - peft>=0.7
  - accelerate>=0.25
  - datasets
  - pillow>=10.0
  - numpy>=1.24
max_retries: 2
