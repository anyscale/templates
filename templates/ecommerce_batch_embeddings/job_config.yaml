# Anyscale Job Configuration
name: ecommerce-batch-embeddings
entrypoint: python scripts/run_pipeline.py --scale medium

working_dir: .
requirements: requirements.txt

compute_config:
  head_node:
    instance_type: m5.4xlarge
  worker_nodes:
    - name: cpu-workers
      instance_type: m5.4xlarge
      min_nodes: 2
      max_nodes: 10
    - name: gpu-workers
      instance_type: g4dn.xlarge
      min_nodes: 1
      max_nodes: 4
max_retries: 2
