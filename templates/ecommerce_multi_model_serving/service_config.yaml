name: ecommerce-recommendation-serving
image_uri: anyscale/ray:2.54.0-py311-cu128
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    - name: gpu-workers
      instance_type: g4dn.xlarge   # T4 GPU — one per ProductRanker replica
      min_nodes: 1
      max_nodes: 4
applications:
  - import_path: deploy:app
    runtime_env:
      working_dir: ./
requirements:
  - ray[serve]>=2.9
  - sentence-transformers>=2.2
  - transformers>=4.35
  - torch>=2.0
  - faiss-cpu>=1.7
  - numpy>=1.24
  - pandas>=2.0
  - pyarrow>=14.0
  - faker>=18.0
  - requests
  - pydantic>=2.0
