# Anyscale Service Configuration — E-Commerce Recommendation System
# Deploy from project root with:  anyscale service deploy -f setup/service.yaml
# Status:       anyscale service status --name ecomm-recommender-service

name: ecomm-recommender-service

applications:
  - name: default
    import_path: serve_app:app
    route_prefix: /
    deployments:
      - name: RecommendationService
        num_replicas: 1
        max_ongoing_requests: 20
        ray_actor_options:
          num_cpus: 1

      - name: ImageToText
        num_replicas: 1
        max_ongoing_requests: 10
        ray_actor_options:
          num_cpus: 2

      - name: ProductRecommender
        num_replicas: 1
        max_ongoing_requests: 10
        ray_actor_options:
          num_cpus: 2

# CPU-only cluster (BLIP-base and MiniLM run fine on CPU for demo traffic)
compute_config:
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    - instance_type: m5.2xlarge
      min_nodes: 0
      max_nodes: 3

# Base image — CPU-only, Python 3.12
# Check https://docs.anyscale.com/reference/base-images for the latest
image_uri: anyscale/ray:2.54.0-slim-py312

working_dir: .

requirements:
  - torch
  - transformers
  - sentence-transformers
  - hf_transfer
  - pillow
  - numpy
  - fastapi
  - pydantic
