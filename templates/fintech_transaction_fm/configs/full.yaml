# Scale: full — the real thing. ~29M params, capacity parity with NVIDIA's
# blueprint decoder (8 layers, 512 hidden). The difference is the tokenizer:
# 1 position per transaction instead of ~12 tokens, so seq_len 512 covers 512
# txns vs ~315 in their 4096-token context. Scores every holdout transaction.
# See configs/mini.yaml for what each key means.

data:
  num_cards: 200000          # > the ~6.1k real cards = use every card

tokenize:
  seq_len: 4096             # NOW IN TOKENS (~12/txn) -> ~314 txns of context (NVIDIA uses 4096)
  target_eval_samples: 400000
  max_pretrain_windows: null
  holdout_keep: 1.0          # exact full-data metrics (~5M eval windows)
  shuffle_partitions: 128

model:                       # Llama causal decoder — NVIDIA blueprint config verbatim
  d_model: 512
  n_layers: 8
  n_heads: 8
  n_kv_heads: 2              # grouped-query attention (4:1)
  head_dim: 64
  dim_ff: 1408               # SwiGLU intermediate
  rope_theta: 500000.0

pretrain:                    # causal-LM (next-token) pretraining of the Llama decoder
  epochs: 8                  # 4096-token Llama seqs are heavy; ~8 epochs >> NVIDIA's ~3000 steps
  batch_size: 4              # global 4x8=32; gradient checkpointing keeps peak ~9GiB on the 15.6GiB GPUs
                             # full-vocab logits tensor (batch x seq x vocab) that OOM'd at 8
  lr: 2.0e-4                 # cosine PEAK lr (NVIDIA blueprint)
  lr_schedule: cosine        # warmup then cosine decay to min_lr_ratio*lr
  warmup_ratio: 0.05
  min_lr_ratio: 0.03         # floor = 3% of peak (NVIDIA: 6.5e-6 / 2e-4)
  weight_decay: 0.077        # transaction-FM recipe
  betas: [0.9, 0.95]         # lower beta2 for steadier late-training updates
  num_workers: 8             # DDP: global batch = batch_size x N
  use_gpu: true
  use_fsdp: false

embed:
  num_workers: 16            # embarrassingly parallel forward pass — scales ~linearly; ~5M
                             # eval windows / batch 256 keeps 16 replicas busy with headroom
  use_gpu: true
  batch_size: 64             # seq_len 4096: with bf16 autocast (see src/embed.py) a 64-window
                             # batch peaks well under the A10G's 24 GiB; 256 OOM'd in fp32.

downstream:                  # distributed XGBoost fit (Ray Train)
  num_workers: 16
  use_gpu: true
