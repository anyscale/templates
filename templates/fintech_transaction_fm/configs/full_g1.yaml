# Scale variant for RUN-G1: identical to full.yaml EXCEPT intra_tx_attention.
# Always run as: --scale full --scale-config configs/full_g1.yaml
# (paths stay in the 'full' namespace; only the model flag differs).
# Scale: full — the real thing. ~29M params, capacity parity with NVIDIA's
# blueprint decoder (8 layers, 512 hidden). The difference is the tokenizer:
# 1 position per transaction instead of ~12 tokens, so seq_len 512 covers 512
# txns vs ~315 in their 4096-token context. Scores every holdout transaction.
# See configs/smoke.yaml for what each key means.

data:
  num_cards: 200000          # > the ~6.1k real cards = use every card

tokenize:
  seq_len: 512
  target_eval_samples: 400000
  max_pretrain_windows: null
  holdout_keep: 0.1          # ~0.5M eval windows — matches xl/xxl for a fair
                             # 512/1024/2048 comparison (1.0 OOMed the driver)
  shuffle_partitions: 128
  merchant_vocab: learned      # real ~100k merchant vocab -> InfoNCE + reco
  merchant_top_k: 20000        # covers ~98% of TabFormer txns (see DESIGN.md)
  merchant_aggregate: 1024     # shared buckets for the long tail + OOV

model:
  d_model: 512
  n_heads: 8
  n_layers: 8
  dim_ff: 2048
  # RUN-2b ablation flags (gemini_ideas.txt; reviewer-vetted). Each is an
  # independent knob; off = the exact previous architecture.
  periodic_amount: true      # G2: Fourier channel on signed log-amount
  periodic_time: true        # G3: Time2Vec channel on log time-deltas
  n_periodic: 16
  intra_tx_attention: true   # RUN-G1: the ONLY delta vs configs/full.yaml —
                             # single-variable test of attention fusion vs
                             # summation on identical tokenized artifacts.

pretrain:
  epochs: 20                 # epochs are cheap: non-overlapping 512-txn windows = ~38k/epoch
  batch_size: 64             # the PROVEN recipe (loss 10.28). Batch 128 + lr 6e-4
                             # halved optimizer steps (3,180 -> 1,600) and degraded
                             # every per-field metric — update-count-bound regime;
                             # do NOT re-bump to chase GRAM%.
  lr: 4.0e-4
  num_workers: 4
  use_gpu: true
  use_fsdp: false
  infonce_negatives: 1024      # shared negatives per batch (TREASURE Alg. 1)
  infonce_warmup_frac: 0.3     # anneal the merchant head in (see small.yaml)
  seq_cl_weight: 0.0           # OFF (RUN-2). The CoLES half-window term trains
                               # same-card invariance ACROSS time — the opposite of
                               # the within-card temporal deviation fraud needs
                               # (TEARDOWN.md #4). Measured: un-collapsed the space
                               # (cos 0.85->0.67) but no downstream change, and it
                               # taxed the merchant head (reco HR@10 0.37->0.05).

embed:
  num_workers: 4
  use_gpu: true
  batch_size: 512            # inference-only: GRAM sat at ~41% with 256 on A10G
  gpus_per_worker: 1.0       # one embed actor per A10G — 2-per-GPU OOMed at
                             # this seq/batch on a 24GB card
