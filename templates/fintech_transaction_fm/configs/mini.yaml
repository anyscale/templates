# Scale: mini — CI / laptop sanity. ~2k cards, tiny model, CPU only.
#
# One file per scale defines EVERYTHING that varies between runs — no
# inheritance, no hidden defaults — so diffing two files shows the complete
# difference between two scales. To run your own experiment:
#
#   cp configs/mini.yaml configs/ttest.yaml    # edit it
#   python scripts/run_pipeline.py --scale ttest
#
# (any configs/<name>.yaml is auto-discovered; or pass --scale-config <path>
# to use a file outside configs/)

data:
  num_cards: 2000            # cards sampled from the source (each card = one txn sequence)
  max_users: 200             # nvsplit: only 200 card-holders → small fast CPU/CI split
  eval_samples: 100000       # nvsplit: >= mini val/test size, so eval keeps all rows

tokenize:
  seq_len: 256               # NOW IN TOKENS (~12/txn) -> ~19 txns of context (CPU smoke)
  target_eval_samples: 30000 # eval-set sizing (val/test) when holdout_keep is null:
                             # all frauds + downsampled, importance-weighted normals
  train_keep: 0.5            # fraction of train-period normals kept for downstream training
                             # (full uses 1.0 = whole training set; kept low here for a fast CI)
  max_pretrain_windows: 8    # cap pretrain windows per card (null = every non-overlapping window)
  holdout_keep: null         # fraction of val/test txns scored directly (null = downsample normals
                             # like train; 1.0 = score EVERY holdout txn — exact metrics, big eval set)
  shuffle_partitions: 32     # hash-shuffle partitions for the tokenize stage

model:                       # tiny Llama decoder (fits one GPU/CPU -> DDP)
  d_model: 64
  n_layers: 2
  n_heads: 4
  n_kv_heads: 2
  head_dim: 16
  dim_ff: 128
  rope_theta: 500000.0

pretrain:
  epochs: 2
  batch_size: 8              # per training worker
  lr: 3.0e-4
  num_workers: 1
  use_gpu: false
  use_fsdp: false            # only worth it if the model outgrows one GPU

embed:                       # single-transaction embeddings (NVIDIA NB04)
  num_workers: 8
  use_gpu: false
  batch_size: 256
  max_ctx: 14                # embed each txn alone (BOS + ~12 field tokens + EOS)
  balanced_train: 40000      # balanced train sample size (caps; mini keeps ~all)

downstream:                  # XGBoost fit on the balanced sample (small)
  num_workers: 1             # single worker -> reproducible, runs in CI
  use_gpu: false
  pca_dim: 64                # PCA the embedding before XGBoost (no-op when emb<=64 dims)
