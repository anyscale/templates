# Scale: small — a quarter of the card-holders, mid-size model, 2 GPUs.
# The same GPU pipeline as full at a fraction of the scale: use it to confirm
# the GPU path works on your cluster before paying for the full build.
# See configs/mini.yaml for what each key means.

data:
  num_cards: 20000
  max_users: 500             # of the ~2,000 card-holders
  eval_samples: 100000

tokenize:
  seq_len: 1024              # ~85 txns of context per pretrain window
  target_eval_samples: 400000  # unused when holdout_keep is 1.0
  train_keep: 1.0
  max_pretrain_windows: null
  holdout_keep: 1.0          # score every holdout txn, like full
  shuffle_partitions: 64

model:                       # mid-size Llama decoder
  d_model: 256
  n_layers: 4
  n_heads: 8
  n_kv_heads: 2
  head_dim: 32
  dim_ff: 704
  rope_theta: 500000.0

pretrain:                    # full's recipe, shortened
  epochs: 2
  batch_size: 8              # global 8x2=16
  lr: 2.0e-4
  lr_schedule: cosine
  warmup_ratio: 0.05
  min_lr_ratio: 0.03
  weight_decay: 0.077
  betas: [0.9, 0.95]
  num_workers: 2
  use_gpu: true
  use_fsdp: false

embed:                       # single-transaction embeddings (NVIDIA NB04)
  num_workers: 2
  use_gpu: true
  batch_size: 256
  max_ctx: 14
  balanced_train: 200000

downstream:
  num_workers: 1
  use_gpu: true
  pca_dim: 64

finetune:                    # Part 7 — supervised fine-tune (beyond-blueprint extension)
  epochs: 1
  batch_size: 64
  lr: 2.0e-5
  num_workers: 2
  use_gpu: true
  max_length: 128
  window_txns: 19
  window_tokens: 256
