# Scale: small — all TabFormer cards, mid-size model, 2 GPUs.
# Batch sized to actually load the GPUs (T4s were mostly idle at 128) with lr
# scaled alongside. See configs/mini.yaml for what each key means.

data:
  num_cards: 20000           # > the ~6.1k real cards = use every card

tokenize:
  seq_len: 1024            # NOW IN TOKENS (~12/txn) -> ~78 txns of context
  target_eval_samples: 150000
  max_pretrain_windows: null
  holdout_keep: null
  shuffle_partitions: 128

model:                     # mid-size Llama decoder
  d_model: 256
  n_layers: 4
  n_heads: 8
  n_kv_heads: 2
  head_dim: 32
  dim_ff: 704
  rope_theta: 500000.0

pretrain:
  epochs: 15
  batch_size: 32          # 1024-token sequences
  lr: 8.0e-4
  num_workers: 2
  use_gpu: true
  use_fsdp: false

embed:
  num_workers: 2
  use_gpu: true
  batch_size: 2048

downstream:                  # distributed XGBoost fit (Ray Train) across the 2 GPUs
  num_workers: 2
  use_gpu: true
