# Scale: ttest — minimal local end-to-end check (synthetic data, CPU, minutes).
# Copied from configs/mini.yaml and shrunk. Run with:
#   python scripts/run_pipeline.py --scale ttest --source synthetic

data:
  num_cards: 300

tokenize:
  seq_len: 16
  target_eval_samples: 3000
  train_keep: 0.5
  max_pretrain_windows: 4
  holdout_keep: null
  shuffle_partitions: 8

model:
  d_model: 32
  n_heads: 2
  n_layers: 2
  dim_ff: 64

pretrain:
  epochs: 1
  batch_size: 32
  lr: 3.0e-4
  num_workers: 1
  use_gpu: false
  use_fsdp: false

embed:
  num_workers: 2
  use_gpu: false
  batch_size: 256

downstream:
  num_workers: 1
  use_gpu: false
