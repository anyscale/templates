# Run the full transaction-FM pipeline as an Anyscale Job.
# The job cluster gets its own /mnt/cluster_storage (ephemeral, shared across
# its nodes), which all stages use as the artifact base dir.
name: fintech-transaction-fm
entrypoint: python scripts/run_pipeline.py --scale small
requirements: requirements.txt
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    # Preferred: one 4xT4 box — on-node DDP all-reduce and 48 vCPUs for the
    # data stages. Often capacity-constrained on AWS, so the ranking flags
    # below fall back to four single-GPU nodes + a CPU node for the shuffle.
    # Cross-node DDP is cheap here anyway: the model is a few M params, so
    # gradients are tiny (and FSDP unnecessary).
    - name: gpu-4x
      instance_type: g4dn.12xlarge
      min_nodes: 0
      max_nodes: 1
    - name: gpu-1x
      instance_type: g4dn.xlarge
      min_nodes: 0
      max_nodes: 4
    - name: cpu-workers
      instance_type: m5.4xlarge
      min_nodes: 0
      max_nodes: 1
  flags:
    # Try the 4xGPU box first; when AWS has no capacity the autoscaler
    # satisfies the same resource demands from the lower-ranked groups.
    instance_ranking_strategy:
      - ranker_type: custom_group_order
        ranker_config:
          group_order:
            - gpu-4x
            - - gpu-1x
              - cpu-workers
max_retries: 1
