# Run the full transaction-FM pipeline as an Anyscale Job.
# The job cluster gets its own /mnt/cluster_storage (ephemeral, shared across
# its nodes), which all stages use as the artifact base dir.
name: fintech-transaction-fm
entrypoint: python scripts/run_pipeline.py --scale small
requirements: requirements.txt
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    # One 4xT4 box instead of four single-GPU nodes: DDP gradients stay on the
    # PCIe fabric (no cross-node all-reduce), and its 48 vCPUs power the data
    # stages (24M-row tokenize shuffle) — no separate CPU group needed. The
    # model is a few M params, so DDP is right and FSDP is unnecessary.
    - name: gpu-worker
      instance_type: g4dn.12xlarge
      min_nodes: 1
      max_nodes: 1
max_retries: 1
