# Run the full transaction-FM pipeline as an Anyscale Job.
# The job cluster gets its own /mnt/cluster_storage (ephemeral, shared across
# its nodes), which all stages use as the artifact base dir.
name: fintech-transaction-fm
entrypoint: python scripts/run_pipeline.py --scale small
requirements: requirements.txt
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    # 64GB headroom for the driver that coordinates the Ray Data shuffles and
    # pulls per-stage results (e.g. the downstream test split it scores locally).
    instance_type: m5.4xlarge
  worker_nodes:
    # Single-GPU nodes: `small` needs 2 GPUs, `full` needs 4 — singles
    # bin-pack exactly (no idle GPUs) and dodge g4dn.12xlarge capacity
    # shortages. Cross-node DDP is cheap here: the model is a few M params,
    # so gradients are tiny (and FSDP unnecessary).
    - name: gpu-1x
      instance_type: g4dn.xlarge
      min_nodes: 0
      max_nodes: 4
    # CPU muscle for the data stages (24M-row tokenize shuffle); GPU nodes
    # never spin up for shuffle work.
    - name: cpu-workers
      instance_type: m5.4xlarge
      min_nodes: 0
      max_nodes: 1
  flags:
    # Prefer the CPU group for CPU-only demands — g4dn.xlarge is cheaper
    # per node, so price-based defaults would otherwise send shuffle tasks
    # to GPU instances. GPU demands can only land on gpu-1x regardless.
    instance_ranking_strategy:
      - ranker_type: custom_group_order
        ranker_config:
          group_order:
            - cpu-workers
            - gpu-1x
max_retries: 1
