# Leak sanity (CLEANUP.md #4.1): the exact probe harness with TRAIN labels
# permuted. If test AP does not collapse to ~fraud prevalence (~0.001), the
# harness leaks and no headline number ships.
name: fintech-fm-control-shuffle
entrypoint: >-
  BASE=/mnt/user_storage/transaction-fm-v2 &&
  python scripts/probe_embeddings.py --base-dir $BASE --scale full --device cuda --seed 0 --shuffle-labels
  --set r2_pooled_last=$BASE/embeddings/full:embedding_last
working_dir: .
requirements: requirements.txt
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: g5.2xlarge   # probes run on the head GPU; 32GB RAM holds 1.2M x 525 float32
max_retries: 0
