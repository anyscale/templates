# Classical burst baseline (CLEANUP.md #4.2): XGB on the 13 raw features +
# causal card-velocity aggregates, no FM anywhere. CPU-only. Doubles as the
# blog section "how far do velocity features get you before you need the FM".
name: fintech-fm-control-velocity
entrypoint: >-
  python scripts/velocity_baseline.py --base-dir /mnt/user_storage/transaction-fm-v2 --scale full
working_dir: .
requirements: requirements.txt
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: m5.4xlarge
max_retries: 0
