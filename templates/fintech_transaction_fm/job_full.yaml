# Full seq-512 run, all stages, from-scratch pretraining on the validated
# benchmark pipeline. Reuses only the cached raw + benchmark.parquet (the rows
# the baseline job just reproduced 0.9875/0.1421 on); every derived artifact is
# regenerated so there is zero doubt what data fed the FM. The old (pre-rerun)
# model is set aside, not deleted. Embed gets 8 GPUs (pure inference — free
# speedup); pretrain stays at 4 workers so training dynamics are unchanged.
name: fintech-transaction-fm-full
entrypoint: >-
  BASE=/mnt/user_storage/transaction-fm-v2 &&
  STAMP=$(date +%s) &&
  for d in tokenized embeddings downstream model; do if [ -e $BASE/$d/full ]; then mv $BASE/$d/full $BASE/$d/full_old_$STAMP; fi; done &&
  python scripts/run_pretrain.py --scale full --base-dir $BASE --use-gpu &&
  python scripts/04_extract_embeddings.py --scale full --base-dir $BASE --use-gpu --num-workers 8 &&
  python scripts/05_train_downstream.py --scale full --base-dir $BASE --with-embeddings &&
  python scripts/06_recommend.py --scale full --base-dir $BASE --use-gpu
working_dir: .
requirements: requirements.txt
env_vars:
  RAY_DEFAULT_OBJECT_STORE_MEMORY_PROPORTION: "0.5"
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: m5.4xlarge
  worker_nodes:
    - name: gpu-1x
      instance_type: g5.xlarge
      min_nodes: 0
      max_nodes: 8
      resources:
        CPU: 0    # GPU nodes invisible to CPU-only tasks (tokenize can't scale/land here)
    - name: cpu-workers
      instance_type: m5.4xlarge
      min_nodes: 0
      max_nodes: 4
max_retries: 1
