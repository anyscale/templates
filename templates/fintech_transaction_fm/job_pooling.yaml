# Score an alternate checkpoint against the benchmark with EVERY pooling
# readout — ONE GPU extraction pass (04 writes embedding_last/mean/max
# columns from a single forward), then one cheap CPU scoring (05) per
# column. Purely additive: no existing artifact is moved or deleted.
# Default target: the original well-converged full checkpoint set aside by
# the rerun (model/full_old_*).
name: fintech-fm-pooling
entrypoint: >-
  BASE=/mnt/user_storage/transaction-fm-v2 &&
  OLD=$(ls -d $BASE/model/full_old_* | head -1) &&
  echo "scoring checkpoint: $OLD" &&
  python scripts/04_extract_embeddings.py --scale full --base-dir $BASE --use-gpu --num-workers 8 --checkpoint-dir $OLD --output $BASE/embeddings/full_navy &&
  for P in last mean max; do
  python scripts/05_train_downstream.py --scale full --base-dir $BASE --with-embeddings --embeddings-path $BASE/embeddings/full_navy --embedding-column embedding_$P --output-dir $BASE/downstream/full_navy_$P || exit 1;
  done
working_dir: .
requirements: requirements.txt
env_vars:
  RAY_DEFAULT_OBJECT_STORE_MEMORY_PROPORTION: "0.5"
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: m5.4xlarge
  worker_nodes:
    - name: gpu-1x
      instance_type: g5.xlarge
      min_nodes: 0
      max_nodes: 8
      resources:
        CPU: 0    # GPU nodes invisible to CPU-only tasks
    # Ray Data's parquet read/write tasks need CPU:1 slots somewhere: the
    # Anyscale head advertises CPU:0 by default and gpu-1x is fenced, so a
    # GPU-only config has ZERO schedulable CPUs (learned the hard way).
    - name: cpu-workers
      instance_type: m5.4xlarge
      min_nodes: 0
      max_nodes: 2
max_retries: 0
