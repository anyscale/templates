# RUN 1 — readout surgery (TEARDOWN.md), ZERO retraining.
# From both existing checkpoints (cl = model/full, navy = model/full_old_*),
# extract per benchmark row: masked-target state, per-field surprise vector,
# single-transaction embedding. Then probe every {set x classifier} with no
# PCA. Decides: "representation fine, readout wrong" vs "representation empty".
name: fintech-fm-run1-readout
entrypoint: >-
  BASE=/mnt/user_storage/transaction-fm-v2 &&
  NAVY=$(ls -d $BASE/model/full_old_* | head -1) &&
  echo "cl ckpt: $BASE/model/full | navy ckpt: $NAVY" &&
  python scripts/04_extract_embeddings.py --scale full --base-dir $BASE --use-gpu --num-workers 8 --readout target --output $BASE/embeddings/full_cl_target &&
  python scripts/04_extract_embeddings.py --scale full --base-dir $BASE --use-gpu --num-workers 8 --readout target --checkpoint-dir $NAVY --output $BASE/embeddings/full_navy_target &&
  python scripts/probe_embeddings.py --base-dir $BASE --scale full --device cuda
  --set cl_masked=$BASE/embeddings/full_cl_target:embedding_masked_last
  --set cl_surprise=$BASE/embeddings/full_cl_target:surprise
  --set cl_single=$BASE/embeddings/full_cl_target:embedding_single
  --set navy_masked=$BASE/embeddings/full_navy_target:embedding_masked_last
  --set navy_surprise=$BASE/embeddings/full_navy_target:surprise
  --set navy_single=$BASE/embeddings/full_navy_target:embedding_single
working_dir: .
requirements: requirements.txt
env_vars:
  RAY_DEFAULT_OBJECT_STORE_MEMORY_PROPORTION: "0.5"
compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: g5.2xlarge   # probe stage runs on the head GPU
  worker_nodes:
    - name: gpu-1x
      instance_type: g5.xlarge
      min_nodes: 0
      max_nodes: 8
      resources:
        CPU: 0
    - name: cpu-workers
      instance_type: m5.4xlarge
      min_nodes: 0
      max_nodes: 2
max_retries: 0
