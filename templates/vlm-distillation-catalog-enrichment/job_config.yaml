# Anyscale Job — VLM Batch Enrichment (Qwen2.5-VL-32B, TP=2 PP=2, 10k rows)
name: ecommerce-enc-vlm-batch-embeddings-enrichment-3b
entrypoint: python scripts/run_enc_vlm_batch_emb_enrich_3b.py

# Pin to the working image from another day's run used (Ray 2.55.0). Without this,
# Anyscale Jobs inherit a default image that may ship an older Ray, which
# triggers "Changing the ray version is not allowed" because requirements.txt
# pins ray[data]>=2.55.
image_uri: anyscale/ray:2.55.0-py311-cu121

working_dir: .
requirements: requirements.txt

compute_config:
  cloud: aws-public-us-west-2
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    # CPU pool kept declared but locked at 0 — the g6.12xlarge worker has 48
    # vCPUs, more than enough for image fetch + decode at observed ~5/48 use.
    # max_nodes:0 prevents Ray from queueing placement groups against this
    # pool (we saw 145 pending PGs on the previous run with max_nodes:8).
    - name: cpu-workers
      instance_type: m5.4xlarge
      min_nodes: 0
      max_nodes: 4
    # 4x L4 per node — one full TP=2 PP=2 replica fits per node.
    # concurrency=1 in the script → exactly 1 replica → exactly 1 node.
    - name: gpu-workers
      instance_type: g6.12xlarge
      min_nodes: 1
      max_nodes: 1

max_retries: 2
